name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: --mac
          - os: windows-latest
            platform: --win
          - os: ubuntu-latest
            platform: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Use a versioned cache key so a Node upgrade doesn't serve stale node_modules
          cache: 'npm'

      # Cache the Electron binary so subsequent runs skip the network download entirely.
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.electron-cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Retry up to 3 times to handle transient "socket hang up" failures
      # that occur when the Electron binary download drops the connection.
      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && break
            echo "Attempt $attempt failed — retrying in 20s…"
            sleep 20
          done
        env:
          ELECTRON_CACHE: ~/.electron-cache

      - name: Build & package
        shell: bash
        run: |
          npm run build
          npx electron-builder ${{ matrix.platform }} --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
