name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: --mac
          - os: windows-latest
            platform: --win
          - os: ubuntu-latest
            platform: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cache the Electron binary so it isn't re-downloaded on every run.
      # ELECTRON_CACHE points to the same path we tell npm ci to use.
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.electron-cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_CACHE: ~/.electron-cache

      - name: Build & package
        shell: bash
        run: |
          npm run build
          npx electron-builder ${{ matrix.platform }} --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS code signing — no certificate in CI
          CSC_IDENTITY_AUTO_DISCOVERY: false
